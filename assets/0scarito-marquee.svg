<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">0scarito animated contribution-grid marquee</title>
  <desc id="desc">Green contribution-graph tiles travel along stepped paths to assemble 0scarito, hold with a glow, then fade away.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="0.54" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10171f"/>
    </linearGradient>
    <clipPath id="stage-clip">
      <rect x="42" y="42" width="1116" height="276" rx="14"/>
    </clipPath>
    <filter id="arrival-glow" x="-18%" y="-28%" width="136%" height="156%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.95  0 0 0 0 0.35  0 0 0 .85 0" result="greenBlur"/>
      <feMerge>
        <feMergeNode in="greenBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <rect id="cell" width="13" height="13" rx="3"/>
    <pattern id="grid" x="50" y="46" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="13" height="13" rx="3" fill="#161b22"/>
    </pattern>
    <style>
      .bit {
        animation-duration: 13.2s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }
      .tile-0 { animation-name: tile-0; }
      .tile-1 { animation-name: tile-1; }
      .tile-2 { animation-name: tile-2; }
      .tile-3 { animation-name: tile-3; }
      .tile-4 { animation-name: tile-4; }
      .tile-5 { animation-name: tile-5; }
      .tile-6 { animation-name: tile-6; }
      .tile-7 { animation-name: tile-7; }
      .tile-8 { animation-name: tile-8; }
      .tile-9 { animation-name: tile-9; }
      .tile-10 { animation-name: tile-10; }
      .tile-11 { animation-name: tile-11; }
      .noise {
        animation: noise-pulse 13.2s ease-in-out infinite;
        opacity: 0.35;
      }
      .noise-1 { animation-delay: -4.4s; }
      .noise-2 { animation-delay: -8.8s; }
      .subtitle {
        animation: subtitle-pop 13.2s ease-in-out infinite;
        opacity: 0;
      }
